<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0B0F19"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" stroke="#5B8CFF" stroke-width="1.5"/>
  <!-- Inner dot -->
  <circle cx="16" cy="16" r="3" fill="#5B8CFF"/>
  <!-- Top tick -->
  <line x1="16" y1="5" x2="16" y2="10" stroke="#5B8CFF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom tick -->
  <line x1="16" y1="22" x2="16" y2="27" stroke="#5B8CFF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left tick -->
  <line x1="5" y1="16" x2="10" y2="16" stroke="#5B8CFF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right tick -->
  <line x1="22" y1="16" x2="27" y2="16" stroke="#5B8CFF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
